name: Cahier
options:
  bundleIdPrefix: com.cahier
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.0"

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  Cahier:
    type: application
    platform: macOS
    dependencies:
      - package: MarkdownUI
    sources:
      - Cahier
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cahier.app
        PRODUCT_NAME: Cahier
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_ENTITLEMENTS: Cahier/Resources/Cahier.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        INFOPLIST_KEY_CFBundleDisplayName: Cahier
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: N847B3JM8G
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
    entitlements:
      path: Cahier/Resources/Cahier.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
